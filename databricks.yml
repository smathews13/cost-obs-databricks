bundle:
  name: cost-obs

variables:
  sql_warehouse_id:
    description: "SQL Warehouse ID for query execution"
  cost_obs_catalog:
    description: "Unity Catalog name for materialized views"
    default: "main"
  cost_obs_schema:
    description: "Schema name for materialized views"
    default: "cost_obs"
  genie_space_id:
    description: "Genie Space ID for AI cost analysis (optional)"
    default: ""

resources:
  apps:
    cost-obs:
      name: cost-obs
      description: "Cost Observability & Control — Databricks spend analytics"
      source_code_path: .
      resources:
        - name: "sql-warehouse"
          sql_warehouse:
            id: ${var.sql_warehouse_id}
            permission: "CAN_USE"

targets:
  dev:
    default: true
    workspace:
      host: ${DATABRICKS_HOST}
    variables:
      sql_warehouse_id: ${DATABRICKS_WAREHOUSE_ID}

  prod:
    workspace:
      host: ${DATABRICKS_HOST}
    variables:
      sql_warehouse_id: ${DATABRICKS_WAREHOUSE_ID}
      cost_obs_catalog: main
      cost_obs_schema: cost_obs
